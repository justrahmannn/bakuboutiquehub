spring.application.name=bakuboutiquehub

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# Standard Spring Boot properties separating URL from credentials for maximum driver compatibility
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Explicit Driver and Dialect setup to bypass metadata probing issues
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection pooling settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.leak-detection-threshold=2000

# Security
app.jwt.secret=${JWT_SECRET:9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a}
app.jwt.expiration-ms=86400000

# Logging diagnostics
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
