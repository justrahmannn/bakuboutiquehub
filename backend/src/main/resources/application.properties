spring.application.name=bakuboutiquehub

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# We use explicit properties to bypass Hibernate's metadata probe which is failing on Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# Explicitly setting the dialect prevents the "Unable to determine Dialect" error
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection pooling settings for reliability
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.leak-detection-threshold=2000

# Security - Secret should be set via environment variable JWT_SECRET in Render
app.jwt.secret=${JWT_SECRET:9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a}
app.jwt.expiration-ms=86400000

# Logging - Enhanced logging for troubleshooting
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
