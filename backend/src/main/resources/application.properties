spring.application.name=bakuboutiquehub

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bakuboutiquehubdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA/Hibernate
# Let Hibernate auto-detect the dialect when connected to PostgreSQL
# Only use H2Dialect as a fallback for local testing
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Connection pooling settings for reliability
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Security
# Placeholder for JWT Secret - Should be more secure in production
app.jwt.secret=9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.atl.bakuboutiquehub=DEBUG
logging.level.org.springframework.security=DEBUG
