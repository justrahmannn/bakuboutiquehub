spring.application.name=bakuboutiquehub

# Database Configuration (H2 File-based)
spring.datasource.url=jdbc:h2:file:./data/bakuboutiquehubdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security
# Placeholder for JWT Secret - Should be more secure in production
app.jwt.secret=9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.atl.bakuboutiquehub=DEBUG
logging.level.org.springframework.security=DEBUG
