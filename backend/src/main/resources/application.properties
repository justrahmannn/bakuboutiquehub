spring.application.name=bakuboutiquehub

# Database Configuration
# In production (Render), these will be provided by environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bakuboutiquehubdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA/Hibernate
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security
# Placeholder for JWT Secret - Should be more secure in production
app.jwt.secret=9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.atl.bakuboutiquehub=DEBUG
logging.level.org.springframework.security=DEBUG
