spring.application.name=bakuboutiquehub

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bakuboutiquehubdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection pooling settings for reliability
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.leak-detection-threshold=2000

# Security
app.jwt.secret=${JWT_SECRET:9a67475d459d49118f182fc1b745425661a9a67475d459d49118f182fc1b745425661a}
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.atl.bakuboutiquehub=DEBUG
logging.level.org.springframework.security=DEBUG
